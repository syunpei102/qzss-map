<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>動作テスト</title>
</head>
<body>
    <div id="map"></div>
     <script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/pmtiles@3.0.3/dist/pmtiles.js"></script>
    <script>
       const protocol = new pmtiles.Protocol();
    maplibregl.addProtocol("pmtiles", protocol.tile);
    fetch("./style.json")
      .then(res => {
        if (!res.ok) throw new Error("style.json の読み込みに失敗");
        return res.json();
      })
      .then(style => {
        const bounds = [[100.0, 15.0], [170.0, 55.0]];
        new maplibregl.Map({
          container: "map",
          style: style,
          center: [135.7671, 35.6812],
          zoom: 4.4,
          minZoom: 4.4,
          maxZoom: 7.9,
          maxBounds: bounds
        });
      })
      .catch(err => {
        console.error(err);
        alert("地図スタイル読み込み失敗");
      });
  </script>
</body>
</html>
