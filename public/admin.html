<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>表示地域の設定 - QZSS 災危通報</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#14161a">
  <link rel="icon" href="./icons/icon-192.png">
  <link rel="stylesheet" href="./style.css">
  <style>
    html, body { margin: 0; height: 100%; background: #1c1c1c; font-family: "Hiragino Sans", "Noto Sans JP", sans-serif; }
    .admin-page { max-width: 480px; margin: 0 auto; padding: 16px 16px 100px; color: azure; }
    .admin-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .admin-header h1 { font-size: 18px; margin: 0; }
    .back-link { color: #9aa0a6; text-decoration: none; font-size: 14px; }
    .back-link:hover { color: azure; }
    .admin-desc { color: #9aa0a6; font-size: 13px; line-height: 1.6; margin: 8px 0 16px; }
    .all-toggle {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.06); border-radius: 10px;
      padding: 12px 14px; margin-bottom: 14px; font-weight: bold;
    }
    .pref-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 4px 12px;
    }
    .pref-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 6px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      font-size: 14px;
    }
    .pref-item input, .all-toggle input { width: 18px; height: 18px; flex-shrink: 0; }
    .save-bar {
      position: fixed; left: 0; right: 0; bottom: 0;
      display: flex; gap: 10px; padding: 12px 16px;
      background: rgba(20,22,26,0.95); backdrop-filter: blur(6px);
      border-top: 1px solid rgba(255,255,255,0.12);
    }
    .save-bar button {
      flex: 1; padding: 12px; border: none; border-radius: 10px;
      font-size: 15px; font-weight: bold; cursor: pointer;
    }
    #save_btn { background: #2f6fed; color: #fff; }
    #save_btn.saved { background: #2ecc71; }
  </style>
</head>
<body>
  <div class="admin-page">
    <div class="admin-header">
      <h1>表示地域の設定</h1>
      <a class="back-link" href="./index.html">← 地図に戻る</a>
    </div>
    <p class="admin-desc">
      対象地域を登録すると、この端末ではその都道府県に関係する通報だけが地図・パネルに表示されます。
      (震源のみで対象都道府県がわからない情報や津波情報は、絞り込みの対象外として常に表示されます)
    </p>

    <label class="all-toggle">
      <input type="checkbox" id="show_all_checkbox" checked>
      すべての地域を表示する(絞り込みなし)
    </label>

    <div id="pref_grid" class="pref-grid"></div>
  </div>

  <div class="save-bar">
    <button id="save_btn">保存する</button>
  </div>

  <script src="./admin.js" defer></script>
</body>
</html>
